<!DOCTYPE html>
<html>
<head>
    <title>SmartSplit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Smart Cost Splitter 💸</h2>

    <form action="/calculate" method="post">

        <div id="inputs">
            <div class="row">
                <input type="text" name="names" placeholder="Name" required>
                <input type="number" name="amounts" placeholder="Amount" required>
            </div>
        </div>

        <button type="button" onclick="addRow()">➕ Add Person</button>
        <br><br>
        <button type="submit">Calculate</button>

    </form>
</div>

<script>
function addRow() {
    let div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
        <input type="text" name="names" placeholder="Name" required>
        <input type="number" name="amounts" placeholder="Amount" required>
    `;

    document.getElementById("inputs").appendChild(div);
}
</script>

</body>
</html>
